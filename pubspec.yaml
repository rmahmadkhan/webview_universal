name: webview_universal
description: Show a webview window on your flutter cross platform android, ios, linux, macos, web, windows.
version: 0.0.5

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  web:
  
environment:
  sdk: ">=2.19.2 <3.0.0"
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter
  path: ^1.9.0
  universal_io: ^2.2.2
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.0
  webview_flutter_web: ^0.2.3+4
  webview_flutter_wkwebview: ^3.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
 
flutter:
  plugin:
    platforms:
      macos:
        pluginClass: WebviewUniversalPlugin
      windows:
        pluginClass: WebviewUniversalPlugin
      linux:
        pluginClass: WebviewUniversalPlugin
